<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        /* Cyber-Fintech specific utility classes */
        .glass-panel {
            background-color: theme('colors.surface');
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border: 1px solid theme('colors.outline-variant');
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(164, 230, 255, 0.2);
        }
        .neon-border-focus:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 10px theme('colors.primary');
            outline: none;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, theme('colors.primary-container'), #6a00ff);
            transition: all 0.3s ease;
        }
        .btn-primary-gradient:hover {
            box-shadow: 0 0 20px theme('colors.primary-container');
            transform: translateY(-1px);
        }
        
        .btn-outline-neon {
            background: transparent;
            border: 1px solid theme('colors.primary');
            color: theme('colors.primary');
            transition: all 0.3s ease;
        }
        .btn-outline-neon:hover {
            box-shadow: inset 0 0 10px rgba(164, 230, 255, 0.3), 0 0 10px rgba(164, 230, 255, 0.3);
            background: rgba(164, 230, 255, 0.05);
        }

        /* Chart placeholder animations */
        @keyframes drawLine {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }
        .animate-line {
            stroke-dasharray: 1000;
            animation: drawLine 2s ease-out forwards;
        }
    </style>
</head>

</div>
</div>
