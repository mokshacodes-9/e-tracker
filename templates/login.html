<style>
        body {
            background-color: #050505;
            color: #e5e2e1;
        }
        
        .glass-panel {
            background: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border: 1px solid rgba(0, 209, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.05);
        }
        
        .input-cyber {
            background: rgba(42, 42, 42, 0.4);
            border: none;
            border-bottom: 1px solid rgba(0, 209, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-cyber:focus {
            outline: none;
            border-bottom: 1px solid #00d1ff;
            box-shadow: 0 4px 15px -5px rgba(0, 209, 255, 0.3);
            background: rgba(42, 42, 42, 0.6);
        }
        
        .btn-neon {
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.8) 0%, rgba(255, 82, 93, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-neon::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #00d1ff 0%, #ff525d 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }
        
        .btn-neon:hover::before {
            opacity: 1;
        }
        
        .btn-neon:hover {
            box-shadow: 0 0 25px rgba(0, 209, 255, 0.4), 0 0 40px rgba(255, 82, 93, 0.3);
            transform: translateY(-2px);
        }
        
        .btn-neon span {
            position: relative;
            z-index: 2;
        }
        
        /* Particle Animation Setup */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .brand-content {
            position: relative;
            z-index: 10;
        }
    </style>

<!-- Lightweight Particle System Script -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }

        // Extremely simple canvas particle effect to simulate cyber-dust
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.createElement('canvas');
            const container = document.getElementById('particles-js');
            if(!container) return;
            
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let particles = [];
            
            function resize() {
                width = container.clientWidth;
                height = container.clientHeight;
                canvas.width = width;
                canvas.height = height;
            }
            
            window.addEventListener('resize', resize);
            resize();
            
            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.color = Math.random() > 0.5 ? '#00d1ff' : '#ff525d';
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x < 0 || this.x > width) this.speedX *= -1;
                    if (this.y < 0 || this.y > height) this.speedY *= -1;
                }
                
                draw() {
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            
            animate();
        });
    </script>
